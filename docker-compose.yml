# https://docs.servicestack.net/ssh-docker-compose-deploment#github-the-backbone-of-your-deployment-pipeline
# version: '3.9'

services:
  mongo:
    image: mongo:6.0.13
    container_name: mongo_database
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    networks:
      - nodejs-mongodb-network
    restart: always
    volumes:
      # - mongo-config:/data/configdb
      - mongo-data:/data/db
    ports:
      - "27017:27017"
      # - "27018:27017" # Host Port : Container Port

  mongo-express:    
    image: mongo-express
    container_name: mongo_express_web_ui
    restart: always
    networks:
      - nodejs-mongodb-network
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: "mongo"
      ME_CONFIG_SITE_BASEURL: "/mongo-express/"

  nodejs-app:
    container_name: expressjs_web_app
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: "expressjs_web_app_img"
    # command: ["./wait-for-it.sh","--", "sh", "change_admin_passwd.sh"]
    # command: "npm start"

    ## Security
    # By default, Docker containers run as the root user (the superuser). This line overrides that default, instructing Docker to use a specific user account defined in your environment variables.
    # Running as root is a significant security risk. If a hacker exploits a vulnerability in your Node.js application (like a remote code execution bug), they would immediately have root access to the container. 
    # From there, it is much easier to "break out" of the container and attack your host machine.
    ##
    # user: ${NODE_USER} 
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: always
    networks:
      - nodejs-mongodb-network
    ports:
      # - "3000:3000"
      #- "3000:443"
      - "3000:80"
    volumes:
      - ./:/home/node/app
    depends_on:
      - mongo
    
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "<http://localhost:4000/health>"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 5


  nginx-nodejs-app:
    container_name: nginx_web_app
    build:
      context: .
      dockerfile: Dockerfile.nginx
    image: "nginx_web_app_img"
    ports:
      - "80:80"
    volumes:
      - ./nginx/config/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./static:/var/www/html
      # - conf:/etc/nginx/conf.d
      # - vhost:/etc/nginx/vhost.d
      # - html:/usr/share/nginx/html
      # - dhparam:/etc/nginx/dhparam
      # - certs:/etc/nginx/certs:ro
      # - /var/run/docker.sock:/tmp/docker.sock:ro
   
    restart: always
    depends_on:
      - nodejs-app
      - mongo-express
    networks:
      - nodejs-mongodb-network

networks:
  nodejs-mongodb-network:
    driver: bridge

volumes:
  mongo-config:
  mongo-data:
  # conf:
  # vhost:
  # html:
  # dhparam:
  # certs: