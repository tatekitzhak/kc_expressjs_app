# version: '3.9'

services:
  nodejs-app:
    container_name: expressjs_web_app
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: "expressjs_web_app_img"
    # command: ["./wait-for-it.sh","--", "sh", "change_admin_passwd.sh"]
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: always
    networks:
      - node-app-network
    ports:
      # - "3000:3000"
      #- "3000:443"
      - "3000:80"
    
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "<http://localhost:4000/health>"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 5


  nginx-nodejs-app:
    container_name: nginx_web_app
    build:
      context: .
      dockerfile: Dockerfile.nginx
    image: "nginx_web_app_img"
    ports:
      - "80:80"
    volumes:
      - ./nginx/config/nginx.conf:/etc/nginx/nginx.conf:ro
    #   - ./static:/var/www/html
   
    restart: always
    depends_on:
      - nodejs-app
    networks:
      - node-app-network

networks:
  node-app-network:
    driver: bridge
